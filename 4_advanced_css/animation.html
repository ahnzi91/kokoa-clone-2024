<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>#4. Advanced CSS</title>
  <style>
    body {
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }
    @keyframes coinFlip {
      0% {
        transform: rotateY(0deg);
      }
      25% {
        transform: scale(2);
      }
      50% {
        border-radius: 0px;
        transform: rotateY(180deg) translateY(100px);
        border-color: tomato;
      }
      75% {
        transform: scale(5);
        border-radius: 20px;
      }
      100% {
        transform: rotateY(0deg);
      }
    }
    img {
      width: 300px;
      height: 300px;
      border: 10px black solid;
      border-radius: 50%;
      animation: coinFlip 5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <img src="img/manchester.png" alt="Day01">
</body>
</html>
