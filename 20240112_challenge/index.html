<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>repl.it</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: tomato;
    }

    #first {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 20vh;
      height: 20vh;
      background-color: wheat;
      border: 2px solid black;
    }

    #second {
      width: 5vh;
      height: 5vh;
      margin-bottom: 20px;
      background-color: teal;
      border: 7px solid white;
    }

    #third {
      width: 15vh;
      height: 5vh;
      margin-bottom: 20px;
      background-color: teal;
      border: 7px dotted white;
    }

    #fourth {
      width: 5vh;
      height: 5vh;
      background-color: teal;
      border: 7px solid white;
    }
  </style>
</head>

<body>
  <div id="first">
    <div id="second"></div>
    <div id="third"></div>
    <div id="fourth"></div>
  </div>
</body>

</html>
