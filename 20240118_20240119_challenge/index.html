<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/reset-css@5.0.1/reset.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/FortAwesome/Font-Awesome@5.14.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="music_player">
      <div class="music_player__box">
        <div class="music_plyer__box-header">
          <span><i class="fas fa-arrow-left fa-lg"></i></span>
          <span><i class="fas fa-search fa-lg"></i></span>
        </div>
        <div class="music_player__box-artist">
          <img
            class="music_player__box-artist-avatar"
            src="https://lh3.googleusercontent.com/xW0MEvKBR_PIk-lZPZOHxItk-4zzfli9wloqnFWeZccnRyqW21qd899gnIYrIcRjqNUTU2EWSgX1S60=w120-h120-p-l90-rj"
          />
          <div class="music_player__box-artist-title">
            <h1 class="music_player__box-artist-title-text">Sam Ryder</h1>
          </div>
          <div class="music_player__box-artist-subtitle">
            <h5 class="music_player__box-artist-subtitle-text">
              Sing a song writer
            </h5>
          </div>
        </div>
        <div class="music_player__box-artist-function">
          <div class="music_player__box-artist-function-shuffle-btn">
            <span>Shuffle</span>
          </div>
          <div class="music_player__box-artist-function-like-btn">
            <span><i class="fas fa-heart fa-lg"></i></span>
            <span>212 971</span>
          </div>
        </div>
        <div class="music_player__box-list">
          <div class="music_player__box-list-column">
            <img
              class="music_player__box-list-avatar"
              src="https://lh3.googleusercontent.com/6wTZg-bWv7Yax1_7G0QlqukOwDJHetzicZj84GHzI93-Axt0Nv638NoG7cC6RnbGSTn0-gZkwVxvnExs=w544-h544-l90-rj"
            />
            <div class="music_player__box-list-info">
              <div class="music_player__box-list-info-title">
                <h2>Sam Ryder</h2>
              </div>
              <div class="music_player__box-list-info-subtitle">
                <h2>Tiny Riot</h2>
              </div>
            </div>
          </div>
          <div>
            <span><i class="fas fa-ellipsis-v"></i></span>
          </div>
        </div>
        <div class="music_player__box-list">
          <div class="music_player__box-list-column">
            <img
              class="music_player__box-list-avatar"
              src="https://lh3.googleusercontent.com/EdckZ7LG6qY7X4QsO-ljgeoHgG7aZg25rNlZWz55MSuV0WOtfoJ5JxjYzlDVQYyH_PJ5qsaBJdR2hbI=w544-h544-l90-rj"
            />
            <div class="music_player__box-list-info">
              <div class="music_player__box-list-info-title">
                <h2>Sam Ryder</h2>
              </div>
              <div class="music_player__box-list-info-subtitle">
                <h2>Back In Love</h2>
              </div>
            </div>
          </div>
          <div>
            <span><i class="fas fa-ellipsis-v"></i></span>
          </div>
        </div>
        <div class="music_player__box-list">
          <div class="music_player__box-list-column">
            <img
              class="music_player__box-list-avatar"
              src="https://lh3.googleusercontent.com/TJhXrVU9VEs_iaWoVkSvx5wtVqqWP3KTFVvSVZKsmZBBarnn7zBhIa3tAZFEaC0HOzo5YvgifFmFU9g=w544-h544-s-l90-rj"
            />
            <div class="music_player__box-list-info">
              <div class="music_player__box-list-info-title">
                <h2>Sam Ryder</h2>
              </div>
              <div class="music_player__box-list-info-subtitle">
                <h2>Fount & Lost</h2>
              </div>
            </div>
          </div>
          <div>
            <span><i class="fas fa-ellipsis-v"></i></span>
          </div>
        </div>
        <div class="music_player__box-list">
          <div class="music_player__box-list-column">
            <img
              class="music_player__box-list-avatar"
              src="https://lh3.googleusercontent.com/XyqRqEOrYE4oEJs6VFDIWssIundHxO454O6CkgJYQpgby7_M35ssWYJ1UTBzEuf6vrddD2sBcoXUAHWL6Q=w544-h544-l90-rj"
            />
            <div class="music_player__box-list-info">
              <div class="music_player__box-list-info-title">
                <h2>Sam Ryder</h2>
              </div>
              <div class="music_player__box-list-info-subtitle">
                <h2>SPACE MAN</h2>
              </div>
            </div>
          </div>
          <div>
            <span><i class="fas fa-ellipsis-v"></i></span>
          </div>
        </div>
        <div class="music_player__box-playlist">
          <div class="music_player__box-playlist-info">
            <div class="music_player__box-playlist-info-title">
              <h2>Sam Ryder</h2>
            </div>
            <div class="music_player__box-playlist-info-subtitle">
              <h2>Back In Love</h2>
            </div>
          </div>
          <div class="music_player__box-playlist-btn">
            <div class="music_player__box-playlist-btn-backward">
              <span><i class="fas fa-step-backward"></i></span>
            </div>
            <div class="music_player__box-playlist-btn-pause">
              <span><i class="fas fa-pause"></i></span>
            </div>
            <div class="music_player__box-playlist-btn-forward">
              <span><i class="fas fa-step-forward"></i></span>
            </div>
          </div>
        </div>
      </div>

      <div class="music_player__box">
        <div class="music_plyer__box-header">
          <span><i class="fas fa-arrow-left fa-lg"></i></span>
          <span><i class="fas fa-ellipsis-v fa-lg"></i></span>
        </div>
        <div class="music_player__box-cover">
          <img
            class="music_player__box-cover-img"
            src="https://lh3.googleusercontent.com/EdckZ7LG6qY7X4QsO-ljgeoHgG7aZg25rNlZWz55MSuV0WOtfoJ5JxjYzlDVQYyH_PJ5qsaBJdR2hbI=w544-h544-l90-rj"
          />
        </div>
        <div class="music_player__box-play">
          <div class="music_player__box-play-title">
            <h1 class="music_player__box-play-title-text">Back In Love</h1>
          </div>
          <div class="music_player__box-play-subtitle">
            <h5 class="music_player__box-play-subtitle-text">Sam Ryder</h5>
          </div>
        </div>
        <div class="music_player__box-time">
          <div>
            <span>1:56</span>
          </div>
          <div>
            <span>2:21</span>
          </div>
        </div>
        <div class="music_player__box-range">
          <input
            type="range"
            min="0"
            max="500"
            class="music_player__box-range-customize"
          />
        </div>
        <div class="music_player__box-icons">
          <span><i class="fas fa-redo-alt fa-lg fa-grey"></i></span>
          <span><i class="fas fa-step-backward fa-lg"></i></span>
          <span><i class="fas fa-play-circle fa-5x"></i></span>
          <span><i class="fas fa-step-forward fa-lg"></i></span>
          <span><i class="fas fa-random fa-lg fa-grey"></i></span>
        </div>
      </div>
    </main>
  </body>
</html>
